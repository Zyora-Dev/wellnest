services:
  - type: web
    name: wellnest
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ZEPTOMAIL_TOKEN
        sync: false
    disk:
      name: wellnest-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
